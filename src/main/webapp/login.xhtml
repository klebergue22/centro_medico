<!DOCTYPE html>
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="http://xmlns.jcp.org/jsf/html"
                xmlns:p="http://primefaces.org/ui"
                xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
                template="/templates/template.xhtml">

    <ui:define name="title">Ingreso - Centro Médico</ui:define>

    <ui:define name="content">
        <h:form id="loginForm" styleClass="ui-fluid">
            <p:panel header="Acceso al módulo de Centro Médico"
                     style="max-width:680px; margin:2rem auto; border-radius:12px;">

                <p:messages id="msgs" showDetail="true" closable="true"/>

                <h:panelGroup layout="block" style="margin-bottom:1rem; color:#3a4b32;">
                    <h:outputText value="Primer ingreso: utilice su cédula como usuario y también como clave."/>
                </h:panelGroup>
                <h:panelGroup layout="block" style="margin-bottom:1rem; color:#3a4b32;">
                    <h:outputText value="¿Olvidó su clave? Ingrese su cédula y presione “Restablecer clave” para recibir una clave temporal por correo."/>
                </h:panelGroup>

                <p:panelGrid columns="3" styleClass="emp-3col ui-fluid"
                             columnClasses="lab,fld,msg" layout="tabular">
                    <h:outputLabel for="cedula" value="Cédula"/>
                    <p:inputText id="cedula" value="#{authCtrl.cedula}" maxlength="10" required="true"
                                 requiredMessage="Ingrese la cédula"/>
                    <p:message for="cedula"/>

                    <h:outputLabel for="clave" value="Clave"/>
                    <p:password id="clave" value="#{authCtrl.clave}" required="true"
                                requiredMessage="Ingrese la clave" feedback="false"/>
                    <p:message for="clave"/>
                </p:panelGrid>

                <div style="display:flex; justify-content:flex-end; gap:.5rem; margin-top:1rem;">
                    <p:commandButton value="Restablecer clave" icon="pi pi-envelope"
                                     actionListener="#{authCtrl.solicitarResetClave}"
                                     process="cedula" update="msgs loginForm"
                                     styleClass="ui-button-secondary"/>
                    <p:commandButton value="Ingresar" icon="pi pi-sign-in"
                                     action="#{authCtrl.login}" update="msgs loginForm"/>
                </div>
            </p:panel>
        </h:form>
    </ui:define>
</ui:composition>
