<!DOCTYPE html>
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="http://xmlns.jcp.org/jsf/html"
                xmlns:p="http://primefaces.org/ui"
                xmlns:f="http://xmlns.jcp.org/jsf/core"
                xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
                template="/templates/template.xhtml">

    <ui:define name="title">Ingreso - Centro Médico</ui:define>

    <ui:define name="content">
        <h:form id="loginForm" styleClass="ui-fluid">
            <p:growl id="growl" showDetail="true" life="7000"/>
            <p:panel header="Ingreso seguro"
                     styleClass="login-card"
                     style="max-width:760px; margin:2rem auto; border-radius:12px;">

                <p:messages id="msgs" showSummary="true" showDetail="false" closable="true"/>

                <h:panelGroup layout="block" styleClass="login-brand">
                    <h:graphicImage library="images" name="LOGO_IGM_FULL_COLOR.png" styleClass="login-brand-logo" alt="IGM"/>
                    <h:panelGroup layout="block">
                        <h:outputText value="Sistema Centro Médico" styleClass="login-brand-title"/>
                        <h:outputText value="Acceso para personal autorizado" styleClass="login-brand-subtitle"/>
                    </h:panelGroup>
                </h:panelGroup>

                <h:panelGroup layout="block" styleClass="login-help-row">
                    <span class="login-help-chip">Primer ingreso: cédula = usuario/clave</span>
                    <span class="login-help-chip">¿Olvidó clave? use “Restablecer”</span>
                    <span class="login-help-chip">¿Sin usuario? use “Registrar médico”</span>
                    <h:panelGroup id="loginHelpIcon" styleClass="pi pi-info-circle login-help-icon"/>
                </h:panelGroup>
                <p:tooltip for="loginHelpIcon" position="top" styleClass="login-tooltip"
                           value="Use su cédula de 10 dígitos. Si no recuerda su clave, restablézcala con su correo institucional."/>

                <p:panelGrid columns="3" styleClass="emp-3col ui-fluid"
                             columnClasses="lab,fld,msg" layout="tabular">
                    <h:outputLabel for="cedula" value="Cédula"/>
                    <p:inputText id="cedula" value="#{authCtrl.cedula}" maxlength="10" required="true"
                                 requiredMessage="Ingrese la cédula"/>
                    <p:message for="cedula"/>

                    <h:outputLabel for="clave" value="Clave"/>
                    <p:password id="clave" value="#{authCtrl.clave}" required="true"
                                requiredMessage="Ingrese la clave" feedback="false"/>
                    <p:message for="clave"/>

                </p:panelGrid>

                <div class="login-actions-row">
                    <p:commandButton value="Registrar nuevo" icon="pi pi-user-plus" type="button"
                                     onclick="PF('dlgRegistroMedico').show();"
                                     styleClass="ui-button-help login-register-btn"/>
                    <p:commandLink value="Restablecer clave"
                                     onclick="PF('dlgResetClave').show();"
                                     styleClass="login-reset-link"/>
                    <p:commandButton value="Ingresar" icon="pi pi-sign-in"
                                     action="#{authCtrl.login}" update="msgs growl loginForm"/>
                </div>
            </p:panel>

            <p:dialog id="dlgResetClave" widgetVar="dlgResetClave" header="Restablecer clave"
                      modal="true" closable="true" resizable="false" width="520">
                <h:panelGrid columns="1" styleClass="ui-fluid" style="gap:.7rem;">
                    <p:inputText id="cedulaResetDlg" value="#{authCtrl.cedulaReset}" maxlength="10"
                                 placeholder="Cédula"/>
                    <h:outputText value="Ingrese su correo institucional para recibir la clave temporal."
                                  style="font-weight:600; color:#2d3f27;"/>
                    <p:inputText id="correoResetDlg" value="#{authCtrl.correoInstitucionalReset}" maxlength="150"
                                 placeholder="usuario@geograficomilitar.gob.ec"/>
                    <small style="color:#4c5d43;">Solo se aceptan correos con dominio @geograficomilitar.gob.ec.</small>
                </h:panelGrid>
                <f:facet name="footer">
                    <p:commandButton value="Enviar clave temporal" icon="pi pi-send"
                                     actionListener="#{authCtrl.solicitarResetClave}"
                                     process="@this cedulaResetDlg correoResetDlg" update="msgs growl loginForm"
                                     oncomplete="if (!args.validationFailed) PF('dlgResetClave').hide();"/>
                    <p:commandButton value="Cancelar" type="button" icon="pi pi-times"
                                     onclick="PF('dlgResetClave').hide();" styleClass="ui-button-secondary"/>
                </f:facet>
            </p:dialog>

            <p:dialog id="dlgRegistroMedico" widgetVar="dlgRegistroMedico" header="Registrar médico"
                      modal="true" closable="true" resizable="false" width="520">
                <h:panelGrid columns="1" styleClass="ui-fluid" style="gap:.7rem;">
                    <h:outputText value="Ingrese su cédula para crear su usuario. Clave inicial: su cédula."
                                  style="font-weight:600; color:#2d3f27;"/>
                    <p:inputText id="cedulaRegistroDlg" value="#{authCtrl.cedulaRegistro}" maxlength="10"
                                 placeholder="0000000000"/>
                    <small style="color:#4c5d43;">Solo pueden registrarse perfiles médicos autorizados.</small>
                </h:panelGrid>
                <f:facet name="footer">
                    <p:commandButton value="Registrar" icon="pi pi-check"
                                     actionListener="#{authCtrl.registrarMedico}"
                                     process="@this cedulaRegistroDlg" update="msgs growl loginForm"
                                     oncomplete="if (!args.validationFailed) PF('dlgRegistroMedico').hide();"/>
                    <p:commandButton value="Cancelar" type="button" icon="pi pi-times"
                                     onclick="PF('dlgRegistroMedico').hide();" styleClass="ui-button-secondary"/>
                </f:facet>
            </p:dialog>
        </h:form>
    </ui:define>
</ui:composition>
