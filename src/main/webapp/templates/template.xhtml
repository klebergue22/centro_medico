<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:f="http://xmlns.jcp.org/jsf/core">

<f:view locale="es">
    <f:metadata>
        <ui:insert name="metadata"/>
    </f:metadata>

    <h:head>
        <title><ui:insert name="title">RRHH</ui:insert></title>


        <ui:insert name="head"/>


        <h:outputStylesheet library="css" name="igm.css"/>

        <link rel="icon" type="image/png"
              href="#{request.contextPath}/resources/images/LOGO_IGM_FULL_COLOR.png" />
    </h:head>

    <h:body>

        <p:dialog modal="true" widgetVar="statusDialog"
                      header="Por favor espere..."
                      draggable="false" closable="false" resizable="false"
                      appendTo="@(body)"
                      styleClass="loading-dialog" width="350">
                <div style="text-align:center; padding:20px;">
                    <h:graphicImage library="images" name="loading.gif"
                                    alt="Cargando..." style="display:block;margin:0 auto;"/>
                    <h:outputText value="Procesando..." style="font-weight:bold;margin-top:8px;"/>
                    <p>Procesando su solicitud...</p>
                </div>
            </p:dialog>

            <h:panelGroup rendered="#{not empty sessionScope.AUTH_USER}" layout="block">
                <div class="topbar">
                    <div class="system-header">
                        <div class="system-title-wrap">
                            <i class="pi pi-plus-circle system-logo-icon" aria-hidden="true"></i>
                            <div class="system-title-group">
                                <span class="system-title">Sistema Centro Médico</span>
                                <span class="system-subtitle">Gestión clínica y ocupacional</span>
                            </div>
                        </div>
                        <h:panelGroup layout="block" styleClass="session-user-box">
                            <span class="session-user-label">
                                <i class="pi pi-user"></i>
                                Usuario conectado
                            </span>
                            <h:outputText value="#{sessionScope.AUTH_USER_NAME}" styleClass="session-user-name"/>
                            <h:outputText value="ID: #{sessionScope.AUTH_USER}" styleClass="session-user-id"/>
                            <h:form>
                                <p:commandButton value="Salir" icon="pi pi-sign-out" actionListener="#{authCtrl.logout}" ajax="false" styleClass="session-logout"/>
                            </h:form>
                        </h:panelGroup>
                    </div>
                    <p:menubar styleClass="navbar-militar">
                        <p:menuitem value="Inicio" icon="pi pi-home" outcome="/index.xhtml"/>
                        <p:submenu label="Módulos" icon="pi pi-sitemap">
                            <p:menuitem value="Consulta de certificados y fichas ocupacionales" icon="pi pi-search" outcome="/pages/empleados.xhtml"/>
                            <p:menuitem value="Consulta médica y receta" icon="pi pi-file-edit" outcome="/pages/consultaMedica.xhtml"/>
                            <p:menuitem value="Salud Ocupacional" icon="pi pi-plus-circle" outcome="/pages/centroMedico.xhtml"/>
                            <p:menuitem value="Administración de seguridad" icon="pi pi-shield" outcome="/pages/admin-seguridad.xhtml"
                                        rendered="#{sessionScope.AUTH_IS_ADMIN eq true}"/>
                        </p:submenu>
                    </p:menubar>
                </div>
            </h:panelGroup>

            <div class="page-container">
                <ui:insert name="content"/>
            </div>

            <p:separator/>
            <footer class="footer-militar">© RRHH</footer>

            <p:ajaxStatus
                onstart="try{PF('statusDialog').show();}catch(e){}"
                onsuccess="try{PF('statusDialog').hide();}catch(e){}"
                onerror="try{PF('statusDialog').hide();}catch(e){}"/>


        <p:dialog id="dlgViewExpiredGlobal"
                  widgetVar="dlgViewExpiredGlobal"
                  header="Sesión expirada"
                  modal="true"
                  closable="true"
                  resizable="false"
                  draggable="false"
                  appendTo="@(body)"
                  width="520">
            <h:panelGroup layout="block" style="display:flex; gap:12px; align-items:flex-start;">
                <i class="pi pi-shield" style="font-size:2rem; color:#b71c1c; margin-top:.15rem;"></i>
                <h:panelGroup layout="block">
                    <h:outputText value="La sesión expiró por tiempo de inactividad." style="display:block; font-weight:700; margin-bottom:.35rem;"/>
                    <h:outputText value="Por seguridad se abrió una vista nueva. Revise los datos y continúe." style="display:block;"/>
                </h:panelGroup>
            </h:panelGroup>
            <f:facet name="footer">
                <p:button value="Ir al inicio" icon="pi pi-home" outcome="/index.xhtml"/>
            </f:facet>
        </p:dialog>

        <h:panelGroup rendered="#{not empty param.expiredView}">
            <h:outputScript>
                $(function(){
                    if (PF('dlgCedula')) {
                        PF('dlgCedula').hide();
                    }
                    if (PF('dlgViewExpiredGlobal')) {
                        PF('dlgViewExpiredGlobal').show();
                    }
                });
            </h:outputScript>
        </h:panelGroup>

        <ui:insert name="dialogs"/>

        <ui:insert name="footer-scripts"/>

    </h:body>
</f:view>
</html>
