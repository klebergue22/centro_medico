<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="http://xmlns.jcp.org/jsf/html"
                xmlns:f="http://xmlns.jcp.org/jsf/core"
                xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
                xmlns:p="http://primefaces.org/ui"
                template="/templates/template.xhtml">

    <ui:define name="title">Reporte de atrasos</ui:define>

    <ui:define name="content">
        <h:form id="reporteAtrasosForm">
            <p:growl id="growl" showDetail="true" life="4500"/>

            <p:panel header="Reporte de atrasos en citas" style="margin-top:10px;">
                <h:panelGrid id="filtros" columns="2" cellpadding="6" styleClass="ui-fluid" columnClasses="20%,80%">
                    <h:outputText value="Desde:"/>
                    <p:calendar value="#{reporteAtrasosCtrl.fechaDesde}" pattern="dd/MM/yyyy HH:mm" showOn="button"/>

                    <h:outputText value="Hasta:"/>
                    <p:calendar value="#{reporteAtrasosCtrl.fechaHasta}" pattern="dd/MM/yyyy HH:mm" showOn="button"/>

                    <h:outputText value="Profesional:"/>
                    <p:selectOneMenu value="#{reporteAtrasosCtrl.idProfesional}">
                        <f:selectItem itemLabel="Todos" itemValue="#{null}" noSelectionOption="true"/>
                        <f:selectItems value="#{reporteAtrasosCtrl.profesionales}" var="p"
                                       itemValue="#{p.idProfesional}" itemLabel="#{p.nombreProfesional}"/>
                    </p:selectOneMenu>
                </h:panelGrid>

                <p:commandButton value="Buscar" icon="pi pi-search"
                                 actionListener="#{reporteAtrasosCtrl.buscar}"
                                 process="@this filtros"
                                 update="resumen tblAtrasos growl"
                                 style="margin-top:8px;"/>
                <p:commandButton value="Limpiar" icon="pi pi-filter-slash"
                                 actionListener="#{reporteAtrasosCtrl.limpiar}"
                                 process="@this"
                                 update="@form"
                                 styleClass="ui-button-secondary"
                                 style="margin-left:6px; margin-top:8px;"/>
            </p:panel>

            <p:panel id="resumen" header="Resumen" style="margin-top:12px;">
                <h:outputText value="Citas atrasadas: #{reporteAtrasosCtrl.totalAtrasos}"/>
            </p:panel>

            <p:dataTable id="tblAtrasos" value="#{reporteAtrasosCtrl.atrasos}" var="a"
                         paginator="true" rows="20" rowsPerPageTemplate="10,20,50,100"
                         emptyMessage="No existen citas atrasadas para los filtros seleccionados"
                         style="margin-top:12px;">
                <p:column headerText="ID cita" sortBy="#{a.idCita}">
                    <h:outputText value="#{a.idCita}"/>
                </p:column>
                <p:column headerText="Cedula" sortBy="#{a.cedula}" filterBy="#{a.cedula}" filterMatchMode="contains">
                    <h:outputText value="#{a.cedula}"/>
                </p:column>
                <p:column headerText="Paciente" sortBy="#{a.paciente}" filterBy="#{a.paciente}" filterMatchMode="contains">
                    <h:outputText value="#{a.paciente}"/>
                </p:column>
                <p:column headerText="Especialidad" sortBy="#{a.especialidad}">
                    <h:outputText value="#{a.especialidad}"/>
                </p:column>
                <p:column headerText="Profesional" sortBy="#{a.profesional}" filterBy="#{a.profesional}" filterMatchMode="contains">
                    <h:outputText value="#{a.profesional}"/>
                </p:column>
                <p:column headerText="Hora cita" sortBy="#{a.fechaInicio}">
                    <h:outputText value="#{a.fechaInicio}">
                        <f:convertDateTime pattern="dd/MM/yyyy HH:mm"/>
                    </h:outputText>
                </p:column>
                <p:column headerText="Estado" sortBy="#{a.estado}">
                    <h:outputText value="#{a.estado}"/>
                </p:column>
                <p:column headerText="Min. atraso" sortBy="#{a.minutosAtraso}">
                    <h:outputText value="#{a.minutosAtraso}"/>
                </p:column>
            </p:dataTable>
        </h:form>
    </ui:define>
</ui:composition>
