<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="http://xmlns.jcp.org/jsf/html"
                xmlns:f="http://xmlns.jcp.org/jsf/core"
                xmlns:p="http://primefaces.org/ui"
                xmlns:ui="http://xmlns.jcp.org/jsf/facelets">

    <p:panel header="Paso 4: Generación y descarga de documentos" styleClass="hx-panel-step4">


        <p:messages id="msgsStep4" showDetail="true" closable="true" />




        <p:panel header="Ficha Médica Ocupacional" style="margin-bottom:14px;" id="panelFicha">


            <h:panelGroup rendered="#{not centroMedicoCtrl.fichaPdfListo}">
                <h:outputText value="La ficha todavía no está generada. Genera la ficha para habilitar la previsualización y descarga." />
                <div style="margin-top:10px;">
                    <p:commandButton value="Generar Ficha (PDF)"
                                     icon="pi pi-file-pdf"
                                     styleClass="ui-button-success"
                                     actionListener="#{centroMedicoCtrl.prepararVistaPreviaFicha}"
                                     process="@this"
                                     update="panelFicha panelCert msgsStep4"
                                     />
                </div>
            </h:panelGroup>


            <h:panelGroup rendered="#{centroMedicoCtrl.fichaPdfListo and not empty centroMedicoCtrl.fichaToken}">

                <div style="display:flex; gap:10px; align-items:center; margin-bottom:10px; flex-wrap:wrap;">

                    <h:outputLink value="#{request.contextPath}/pdf?token=#{centroMedicoCtrl.fichaToken}&amp;download=1"
                                  target="_blank"
                                  styleClass="ui-button ui-widget ui-state-default ui-corner-all ui-button-text-icon-left">
                        <span class="ui-button-icon-left ui-icon ui-c pi pi-download"></span>
                        <span class="ui-button-text ui-c">Descargar Ficha (PDF)</span>
                    </h:outputLink>


                    <h:outputLink value="#{request.contextPath}/pdf?token=#{centroMedicoCtrl.fichaToken}"
                                  target="_blank"
                                  styleClass="ui-button ui-widget ui-state-default ui-corner-all ui-button-text-icon-left">
                        <span class="ui-button-icon-left ui-icon ui-c pi pi-external-link"></span>
                        <span class="ui-button-text ui-c">Abrir Ficha</span>
                    </h:outputLink>
                </div>


                <div style="border:1px solid #d7d7d7; border-radius:8px; overflow:hidden;">
                    <object data="#{request.contextPath}/pdf?token=#{centroMedicoCtrl.fichaToken}"
                            type="application/pdf"
                            style="width:100%; height:720px;">
                        <h:outputText value="Tu navegador no soporta previsualización PDF. Usa el botón Descargar."
                                      style="display:block; padding:10px;"/>
                    </object>
                </div>
            </h:panelGroup>
        </p:panel>




        <p:panel header="Certificado" style="margin-top:18px;" id="panelCert">


            <h:panelGroup rendered="#{not centroMedicoCtrl.certPdfListo}">
                <h:outputText value="El certificado todavía no está generado." />


                <h:panelGroup rendered="#{not centroMedicoCtrl.fichaPdfListo}">
                    <br/>
                    <h:outputText value="(Primero genera la ficha para habilitar el certificado.)" style="color:#6c757d;" />
                </h:panelGroup>

                <h:panelGroup rendered="#{centroMedicoCtrl.fichaPdfListo}">
                    <div style="margin-top:10px;">
                        <p:commandButton value="Generar Certificado (PDF)"
                                         icon="pi pi-file-pdf"
                                         styleClass="ui-button-help"
                                         actionListener="#{centroMedicoCtrl.prepararVistaPreviaCertificado}"
                                         process="@this"
                                         update="panelCert msgsStep4"
                                         />
                    </div>
                </h:panelGroup>
            </h:panelGroup>


            <h:panelGroup rendered="#{centroMedicoCtrl.certPdfListo and not empty centroMedicoCtrl.certToken}">

                <div style="display:flex; gap:10px; align-items:center; margin-bottom:10px; flex-wrap:wrap;">

                    <h:outputLink value="#{request.contextPath}/pdf?token=#{centroMedicoCtrl.certToken}&amp;download=1"
                                  target="_blank"
                                  styleClass="ui-button ui-widget ui-state-default ui-corner-all ui-button-text-icon-left">
                        <span class="ui-button-icon-left ui-icon ui-c pi pi-download"></span>
                        <span class="ui-button-text ui-c">Descargar Certificado (PDF)</span>
                    </h:outputLink>


                    <h:outputLink value="#{request.contextPath}/pdf?token=#{centroMedicoCtrl.certToken}"
                                  target="_blank"
                                  styleClass="ui-button ui-widget ui-state-default ui-corner-all ui-button-text-icon-left">
                        <span class="ui-button-icon-left ui-icon ui-c pi pi-external-link"></span>
                        <span class="ui-button-text ui-c">Abrir Certificado</span>
                    </h:outputLink>
                </div>

                <div style="border:1px solid #d7d7d7; border-radius:8px; overflow:hidden;">
                    <object data="#{request.contextPath}/pdf?token=#{centroMedicoCtrl.certToken}"
                            type="application/pdf"
                            style="width:100%; height:720px;">
                        <h:outputText value="Tu navegador no soporta previsualización PDF. Usa el botón Descargar."
                                      style="display:block; padding:10px;"/>
                    </object>
                </div>
            </h:panelGroup>

        </p:panel>

    </p:panel>

</ui:composition>
