<!DOCTYPE html>
<ui:composition template="/templates/template.xhtml"
                xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="http://xmlns.jcp.org/jsf/html"
                xmlns:f="http://xmlns.jcp.org/jsf/core"
                xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
                xmlns:p="http://primefaces.org/ui">

    <ui:define name="content">

        <h:form id="formAutoTest">
            <h3>Prueba Autocomplete CIE10</h3>

            <p:autoComplete id="ciePrueba"
                            widgetVar="ciePruebaWidget"
                            value="#{centroMedicoCtrl.pruebaCieTexto}"
                            completeMethod="#{centroMedicoCtrl.completarCiePruebaFija}"
                            var="item"
                            itemLabel="#{item}"
                            itemValue="#{item}"
                            dropdown="true"
                            dropdownMode="current"
                            minQueryLength="0"
                            queryDelay="0"
                            maxResults="20"
                            scrollHeight="250"
                            appendTo="@(body)"
                            forceSelection="false"
                            cache="false">
                <p:column>
                    <h:outputText value="#{item}" />
                </p:column>
            </p:autoComplete>
        </h:form>

        <h:form id="centroForm">
            <h:outputText value="Evaluación Médica Ocupacional" />

            <p:growl id="growl" showDetail="true" life="4000" sticky="false"/>
            <p:messages id="msgs" closable="true" showDetail="true"/>

            <p:remoteCommand name="rcAutoOpenCedulaDlg"
                             autoRun="true"
                             process="@this"
                             actionListener="#{centroMedicoCtrl.consumirAutoOpenCedulaDlg}"
                             oncomplete="if (args &amp;&amp; args.openCedulaDlg === true) { if (PF('dlgCedula')) { PF('dlgCedula').show(); } else { setTimeout(function () { if (PF('dlgCedula')) { PF('dlgCedula').show(); } }, 200); } }"/>

            <p:tabView id="tabsFicha"
                       activeIndex="#{centroMedicoCtrl.activeTabIndex}"
                       dynamic="true"
                       cache="false">

                <p:tab id="step1" title="Formulario (A–F)">
                    <ui:include src="/pages/step1.xhtml"/>
                </p:tab>

                <p:tab id="step2" title="Riesgos (G)">
                    <ui:include src="/pages/step2.xhtml"/>
                </p:tab>

                <p:tab id="step3" title="Historia / Resultados (H–O)">
                    <h:outputText value="step3"/>
                </p:tab>

                <p:tab id="step4" title="Certificado (PDF)">
                    <h:outputText value="step4"/>
                </p:tab>

            </p:tabView>
        </h:form>

        <p:dialog id="dlgCedula"
                  widgetVar="dlgCedula"
                  header="Buscar por cédula"
                  modal="true"
                  closable="false"
                  resizable="false"
                  draggable="false"
                  appendTo="@(body)"
                  width="560">

            <p:ajax event="show" listener="#{centroMedicoCtrl.onDlgCedulaShown}"/>
            <p:ajax event="hide" listener="#{centroMedicoCtrl.onDlgCedulaHide}"/>
            <p:ajax event="close" listener="#{centroMedicoCtrl.onDlgCedulaClose}"/>

            <h:form id="dlgCedulaForm">
                <p:messages id="msgCedula" showDetail="true" closable="true"/>

                <h:panelGrid id="gridCedula" columns="2"
                             columnClasses="col-label-man,col-field-man"
                             styleClass="grid-manual">

                    <h:outputLabel for="cedulaBusqueda" value="Cédula *"/>

                    <p:inputText id="cedulaBusqueda"
                                 value="#{centroMedicoCtrl.cedulaBusqueda}"
                                 maxlength="10"
                                 autocomplete="off"/>

                    <h:outputLabel/>

                    <h:panelGroup layout="block" style="text-align:right;">
                        <p:commandButton id="btnBuscarCedula"
                                         value="BUSCAR"
                                         icon="pi pi-search"
                                         action="#{centroMedicoCtrl.buscarCedula}"
                                         process="@this cedulaBusqueda"
                                         update="dlgCedulaForm:msgCedula dlgCedulaForm:panelBtnManualWrap :msgs"
                                         oncomplete="if (args) { if (args.encontrado) { PF('dlgCedula').hide(); } else if (args.mostrarManual) { PF('dlgPersonaAux').show(); } }"/>

                        <p:commandButton id="btnCerrarCedula"
                                         value="Cerrar"
                                         icon="pi pi-times"
                                         type="button"
                                         onclick="PF('dlgCedula').hide();"
                                         styleClass="ui-button-secondary"
                                         style="margin-left:.5rem;"/>
                    </h:panelGroup>
                </h:panelGrid>

                <p:outputPanel id="panelBtnManualWrap"
                               layout="block"
                               style="margin-top:14px;"
                               rendered="#{centroMedicoCtrl.permitirIngresoManual}">

                    <p:separator/>

                    <h:panelGroup layout="block" style="text-align:center;">
                        <h:outputText value="No se encontró el empleado. Puede ingresar los datos manualmente."
                                      style="display:block; margin-bottom:10px; font-weight:600;"/>

                        <p:commandButton id="btnIngresoManual"
                                         value="INGRESAR DATOS MANUALMENTE"
                                         icon="pi pi-user-plus"
                                         type="button"
                                         styleClass="ui-button-warning"
                                         onclick="PF('dlgPersonaAux').show();"/>

                        <p:commandButton id="btnReintentar"
                                         value="Limpiar / Reintentar"
                                         icon="pi pi-refresh"
                                         styleClass="ui-button-secondary"
                                         style="margin-left:.5rem;"
                                         action="#{centroMedicoCtrl.limpiarBusquedaCedula}"
                                         process="@this"
                                         update="dlgCedulaForm:msgCedula dlgCedulaForm:panelBtnManualWrap dlgCedulaForm:cedulaBusqueda"/>
                    </h:panelGroup>
                </p:outputPanel>
            </h:form>
        </p:dialog>

    </ui:define>

</ui:composition>
