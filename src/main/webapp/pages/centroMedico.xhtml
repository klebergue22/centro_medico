<!DOCTYPE html>
<ui:composition template="/templates/template.xhtml"
                xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="http://xmlns.jcp.org/jsf/html"
                xmlns:f="http://xmlns.jcp.org/jsf/core"
                xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
                xmlns:p="http://primefaces.org/ui">

    <ui:define name="content">

        <h:form id="formAutoTest">
            <h3>Prueba Autocomplete CIE10</h3>

            <p:autoComplete id="ciePrueba"
                            widgetVar="ciePruebaWidget"
                            value="#{centroMedicoCtrl.pruebaCieTexto}"
                            completeMethod="#{centroMedicoCtrl.completarCiePruebaFija}"
                            var="item"
                            itemLabel="#{item}"
                            itemValue="#{item}"
                            dropdown="true"
                            dropdownMode="current"
                            minQueryLength="0"
                            queryDelay="0"
                            maxResults="20"
                            scrollHeight="250"
                            appendTo="@(body)"
                            forceSelection="false"
                            cache="false">
                <p:column>
                    <h:outputText value="#{item}" />
                </p:column>
            </p:autoComplete>
        </h:form>

        <h:form id="centroForm">
            <h:outputText value="Evaluación Médica Ocupacional" />

            <p:growl id="growl" showDetail="true" life="4000" sticky="false"/>
            <p:messages id="msgs" closable="true" showDetail="true"/>

            <p:remoteCommand name="rcAutoOpenCedulaDlg"
                             autoRun="true"
                             process="@this"
                             actionListener="#{centroMedicoCtrl.consumirAutoOpenCedulaDlg}"
                             oncomplete="if (args &amp;&amp; args.openCedulaDlg === true) { if (PF('dlgCedula')) { PF('dlgCedula').show(); } else { setTimeout(function () { if (PF('dlgCedula')) { PF('dlgCedula').show(); } }, 200); } }"/>

            <p:remoteCommand name="rcOnDlgCedulaShown"
                             process="@this"
                             actionListener="#{centroMedicoCtrl.onDlgCedulaShown}"/>

            <p:remoteCommand name="rcOnDlgCedulaHide"
                             process="@this"
                             actionListener="#{centroMedicoCtrl.onDlgCedulaHide}"/>

            <p:remoteCommand name="rcUpdateWizard"
                             process="@this"
                             update="tabsFicha msgs"/>

            <p:tabView id="tabsFicha"
                       activeIndex="#{centroMedicoCtrl.activeTabIndex}"
                       dynamic="true"
                       cache="false">

                <p:tab id="step1" title="Formulario (A–F)">
                    <ui:include src="/pages/steps/step1.xhtml"/>
                </p:tab>

                <p:tab id="step2" title="Riesgos (G)">
                    <ui:include src="/pages/steps/step2.xhtml"/>
                </p:tab>

                <p:tab id="step3" title="Historia / Resultados (H–O)">
                    <ui:include src="/pages/steps/step3.xhtml"/>
                </p:tab>

                <p:tab id="step4" title="Certificado (PDF)">
                    <ui:include src="/pages/steps/step4.xhtml"/>
                </p:tab>

            </p:tabView>

            <p:toolbar styleClass="mt-3">
                <p:toolbarGroup>
                    <p:commandButton value="Anterior"
                                     icon="pi pi-angle-left"
                                     actionListener="#{centroMedicoCtrl.anteriorTab}"
                                     process="@this"
                                     update="tabsFicha msgs"/>

                    <p:spacer width="8"/>

                    <p:commandButton value="Siguiente"
                                     icon="pi pi-angle-right"
                                     actionListener="#{centroMedicoCtrl.siguienteTab}"
                                     process="@this"
                                     update="tabsFicha msgs"/>
                </p:toolbarGroup>
            </p:toolbar>
        </h:form>

        <p:dialog id="dlgCedula"
                  widgetVar="dlgCedula"
                  header="Buscar por cédula"
                  modal="true"
                  closable="false"
                  resizable="false"
                  draggable="false"
                  appendTo="@(body)"
                  onShow="rcOnDlgCedulaShown();"
                  onHide="rcOnDlgCedulaHide();"
                  width="560">


           <p:ajax event="open" listener="#{centroMedicoCtrl.onDlgCedulaShown}"/>


            <p:ajax event="close" listener="#{centroMedicoCtrl.onDlgCedulaClose}"/>

            <h:form id="dlgCedulaForm">
                <p:messages id="msgCedula" showDetail="true" closable="true"/>

                <h:panelGrid id="gridCedula" columns="2"
                             columnClasses="col-label-man,col-field-man"
                             styleClass="grid-manual">

                    <h:outputLabel for="cedulaBusqueda" value="Cédula *"/>

                    <p:inputText id="cedulaBusqueda"
                                 value="#{centroMedicoCtrl.cedulaBusqueda}"
                                 maxlength="10"
                                 autocomplete="off"/>

                    <h:outputLabel/>

                    <h:panelGroup layout="block" style="text-align:right;">
                        <p:commandButton id="btnBuscarCedula"
                                         value="BUSCAR"
                                         icon="pi pi-search"
                                         action="#{centroMedicoCtrl.buscarCedula}"
                                         process="@this cedulaBusqueda"
                                         update="dlgCedulaForm:msgCedula dlgCedulaForm:panelBtnManualWrap :centroForm:msgs :centroForm:tabsFicha"
                                         oncomplete="if (args) { if (args.encontrado) { PF('dlgCedula').hide(); } else if (args.mostrarManual) { PF('dlgPersonaAux').show(); } }"/>

                        <p:commandButton id="btnCerrarCedula"
                                         value="Cerrar"
                                         icon="pi pi-times"
                                         type="button"
                                         onclick="PF('dlgCedula').hide();"
                                         styleClass="ui-button-secondary"
                                         style="margin-left:.5rem;"/>
                    </h:panelGroup>
                </h:panelGrid>

                <p:outputPanel id="panelBtnManualWrap"
                               layout="block"
                               style="margin-top:14px;"
                               rendered="#{centroMedicoCtrl.permitirIngresoManual}">

                    <p:separator/>

                    <h:panelGroup layout="block" style="text-align:center;">
                        <h:outputText value="No se encontró el empleado. Puede ingresar los datos manualmente."
                                      style="display:block; margin-bottom:10px; font-weight:600;"/>

                        <p:commandButton id="btnIngresoManual"
                                         value="INGRESAR DATOS MANUALMENTE"
                                         icon="pi pi-user-plus"
                                         type="button"
                                         styleClass="ui-button-warning"
                                         onclick="PF('dlgPersonaAux').show();"/>

                        <p:commandButton id="btnReintentar"
                                         value="Limpiar / Reintentar"
                                         icon="pi pi-refresh"
                                         styleClass="ui-button-secondary"
                                         style="margin-left:.5rem;"
                                         action="#{centroMedicoCtrl.limpiarBusquedaCedula}"
                                         process="@this"
                                         update="dlgCedulaForm:msgCedula dlgCedulaForm:panelBtnManualWrap dlgCedulaForm:cedulaBusqueda"/>
                    </h:panelGroup>
                </p:outputPanel>
            </h:form>
        </p:dialog>

        <p:dialog id="dlgPersonaAux"
                  widgetVar="dlgPersonaAux"
                  header="Ingreso manual de paciente"
                  modal="true"
                  closable="true"
                  resizable="false"
                  draggable="false"
                  appendTo="@(body)"
                  width="640">

            <h:form id="dlgPersonaAuxForm">
                <p:messages id="msgPersonaAux" showDetail="true" closable="true"/>

                <h:outputText value="Complete los datos mínimos para continuar con la ficha."
                              styleClass="manual-info"/>

                <h:panelGrid id="gridManual" columns="2"
                             columnClasses="manual-label,manual-field"
                             styleClass="manual-grid">

                    <h:outputLabel for="cedManual" value="Cédula *"/>
                    <p:inputText id="cedManual"
                                 value="#{centroMedicoCtrl.personaAux.cedula}"
                                 maxlength="10"
                                 required="true"
                                 requiredMessage="La cédula es obligatoria."
                                 readonly="true"/>

                    <h:outputLabel for="ap1Manual" value="Primer apellido *"/>
                    <p:inputText id="ap1Manual"
                                 value="#{centroMedicoCtrl.personaAux.apellido1}"
                                 maxlength="60"
                                 required="true"
                                 requiredMessage="El primer apellido es obligatorio."/>

                    <h:outputLabel for="ap2Manual" value="Segundo apellido"/>
                    <p:inputText id="ap2Manual"
                                 value="#{centroMedicoCtrl.personaAux.apellido2}"
                                 maxlength="60"/>

                    <h:outputLabel for="nom1Manual" value="Primer nombre *"/>
                    <p:inputText id="nom1Manual"
                                 value="#{centroMedicoCtrl.personaAux.nombre1}"
                                 maxlength="60"
                                 required="true"
                                 requiredMessage="El primer nombre es obligatorio."/>

                    <h:outputLabel for="nom2Manual" value="Segundo nombre"/>
                    <p:inputText id="nom2Manual"
                                 value="#{centroMedicoCtrl.personaAux.nombre2}"
                                 maxlength="60"/>

                    <h:outputLabel for="sexoManual" value="Sexo *"/>
                    <p:selectOneMenu id="sexoManual"
                                     value="#{centroMedicoCtrl.personaAux.sexo}"
                                     required="true"
                                     requiredMessage="El sexo es obligatorio.">
                        <f:selectItem itemLabel="Seleccione" itemValue="" noSelectionOption="true"/>
                        <f:selectItem itemLabel="Masculino" itemValue="M"/>
                        <f:selectItem itemLabel="Femenino" itemValue="F"/>
                    </p:selectOneMenu>

                    <h:outputLabel for="fechaNacManual" value="Fecha nacimiento *"/>
                    <p:calendar id="fechaNacManual"
                                value="#{centroMedicoCtrl.personaAux.fechaNac}"
                                pattern="dd/MM/yyyy"
                                navigator="true"
                                yearRange="c-100:c"
                                showOn="button"
                                mask="true"
                                required="true"
                                requiredMessage="La fecha de nacimiento es obligatoria."/>
                </h:panelGrid>

                <h:panelGroup layout="block" style="margin-top:12px; text-align:right;">
                    <p:commandButton id="btnGuardarManual"
                                     value="GUARDAR Y USAR"
                                     icon="pi pi-check"
                                     styleClass="manual-btn-guardar"
                                     action="#{centroMedicoCtrl.guardarPersonaAuxYUsar}"
                                     process="@form"
                                     update="dlgPersonaAuxForm:msgPersonaAux :centroForm:msgs :centroForm:tabsFicha"
                                     oncomplete="if (!(args &amp;&amp; args.validationFailed)) { PF('dlgPersonaAux').hide(); PF('dlgCedula').hide(); }"/>
                </h:panelGroup>
            </h:form>
        </p:dialog>

    </ui:define>

</ui:composition>
