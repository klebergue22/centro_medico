<!DOCTYPE html>
<ui:composition template="/templates/template.xhtml"
                xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="http://xmlns.jcp.org/jsf/html"
                xmlns:f="http://xmlns.jcp.org/jsf/core"
                xmlns:p="http://primefaces.org/ui"
                xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
                xmlns:pt="http://xmlns.jcp.org/jsf/passthrough">

    <ui:define name="metadata">
        <!--
        <f:viewAction action="#{centroMedicoViewLifecycleCoordinator.preRender(centroMedicoCtrl)}" onPostback="false"/>
        -->
    </ui:define>

    <ui:define name="content">
        <h:form id="formAutoTest">
            <h3>Prueba Autocomplete CIE10</h3>

            <p:autoComplete id="ciePrueba"
                            widgetVar="ciePruebaWidget"
                            value="#{centroMedicoCtrl.pruebaCieTexto}"
                            completeMethod="#{centroMedicoCtrl.completarCiePruebaFija}"
                            var="item"
                            itemLabel="#{item}"
                            itemValue="#{item}"
                            dropdown="true"
                            dropdownMode="current"
                            minQueryLength="0"
                            queryDelay="0"
                            maxResults="20"
                            scrollHeight="250"
                            appendTo="@(body)"
                            forceSelection="false"
                            cache="false">
                <p:column>
                    <h:outputText value="#{item}" />
                </p:column>
            </p:autoComplete>
        </h:form>

        <!--
        <h:form id="centroForm">
            Todo el contenido original de la vista queda comentado temporalmente
            para aislar la prueba mínima del autocomplete en esta ruta.
        </h:form>
        -->
    </ui:define>
</ui:composition>
