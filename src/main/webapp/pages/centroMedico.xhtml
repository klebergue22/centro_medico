<!DOCTYPE html>
<ui:composition template="/templates/template.xhtml"
                xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="http://xmlns.jcp.org/jsf/html"
                xmlns:f="http://xmlns.jcp.org/jsf/core"
                xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
                xmlns:p="http://primefaces.org/ui">

    <ui:define name="metadata">
        <!--
        <f:viewAction action="#{centroMedicoViewLifecycleCoordinator.preRender(centroMedicoCtrl)}" onPostback="false"/>
        -->
    </ui:define>

    <ui:define name="content">
        <h:form id="formAutoTest">
            <h3>Prueba Autocomplete CIE10</h3>

            <p:autoComplete id="ciePrueba"
                            widgetVar="ciePruebaWidget"
                            value="#{centroMedicoCtrl.pruebaCieTexto}"
                            completeMethod="#{centroMedicoCtrl.completarCiePruebaFija}"
                            var="item"
                            itemLabel="#{item}"
                            itemValue="#{item}"
                            dropdown="true"
                            dropdownMode="current"
                            minQueryLength="0"
                            queryDelay="0"
                            maxResults="20"
                            scrollHeight="250"
                            appendTo="@(body)"
                            forceSelection="false"
                            cache="false">
                <p:column>
                    <h:outputText value="#{item}" />
                </p:column>
            </p:autoComplete>
        </h:form>

        <h:form id="centroForm">
            <h:outputText value="Evaluación Médica Ocupacional" />
            <h:outputStylesheet library="primefaces" name="primeicons/primeicons.css"/>

            <p:growl id="growl" showDetail="true" life="4000" sticky="false"/>
            <p:messages id="msgs" closable="true" showDetail="true"/>

            <p:remoteCommand name="rcAutoOpenCedulaDlg"
                             autoRun="true"
                             process="@this"
                             actionListener="#{centroMedicoCtrl.consumirAutoOpenCedulaDlg}"
                             oncomplete="if (args &amp;&amp; args.openCedulaDlg === true) { if (PF('dlgCedula')) { PF('dlgCedula').show(); } else { setTimeout(function () { if (PF('dlgCedula')) { PF('dlgCedula').show(); } }, 200); } }"/>

            <p:remoteCommand name="rcUpdateWizard"
                             process="@this"
                             update="@([id$=tabsFicha]) @([id$=msgs])"/>

            <p:tabView id="tabsFicha"
                       activeIndex="#{centroMedicoCtrl.activeTabIndex}"
                       dynamic="false"
                       cache="false">

                <p:tab id="step1" title="Formulario (A–F)">
                    <ui:include src="/pages/step1.xhtml"/>
                </p:tab>

                <p:tab id="step2" title="Riesgos (G)">
                    <ui:include src="/pages/step2.xhtml"/>
                </p:tab>

                <p:tab id="step3" title="Historia / Resultados (H–O)">
                    <ui:include src="/pages/step3.xhtml"/>
                </p:tab>

                <p:tab id="step4" title="Certificado (PDF)">
                    <ui:include src="/pages/step4.xhtml"/>
                </p:tab>
            </p:tabView>

            <p:toolbar styleClass="mt-3">
                <p:toolbarGroup>
                    <p:commandButton value="Anterior"
                                     icon="pi pi-angle-left"
                                     actionListener="#{centroMedicoCtrl.anteriorTab}"
                                     process="@this"
                                     update="@([id$=tabsFicha]) @([id$=msgs])" />
                    <p:spacer width="8"/>
                    <p:commandButton value="Siguiente"
                                     icon="pi pi-angle-right"
                                     actionListener="#{centroMedicoCtrl.siguienteTab}"
                                     process="@this"
                                     update="@([id$=tabsFicha]) @([id$=msgs])" />
                </p:toolbarGroup>
            </p:toolbar>
        </h:form>
    </ui:define>
</ui:composition>
