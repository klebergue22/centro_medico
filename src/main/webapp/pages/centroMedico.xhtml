<ui:composition template="/templates/template.xhtml"
                xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="http://xmlns.jcp.org/jsf/html"
                xmlns:f="http://xmlns.jcp.org/jsf/core"
                xmlns:p="http://primefaces.org/ui"
                xmlns:ui="http://xmlns.jcp.org/jsf/facelets">

    <ui:define name="content">
        <h:form id="centroForm">
            <h:outputText value="Evaluación Médica Ocupacional" />
            <h:outputStylesheet library="primefaces" name="primeicons/primeicons.css"/>
            <p:growl id="growl" showDetail="true" life="4000" sticky="false"/>
            <p:messages id="msgs" closable="true" showDetail="true"/>




        <p:remoteCommand name="rcAutoOpenCedulaDlg"
                         autoRun="true"
                         process="@this"
                         actionListener="#{centroMedicoCtrl.consumirAutoOpenCedulaDlg}"
                         oncomplete="if (args.openCedulaDlg === true) {
                         if (PF('dlgCedula')) {
                         PF('dlgCedula').show();
                         } else {
                         setTimeout(function () {
                         if (PF('dlgCedula')) {
                         PF('dlgCedula').show();
                         }
                         }, 200);
                         }
                         }"/>

        <p:remoteCommand name="rcUpdateWizard"
                         process="@this"
                         update="@([id$=wdzFicha]) @([id$=msgs])"/>


        <p:wizard id="wdzFicha" widgetVar="wdzFicha"
                  showNavBar="false" showStepStatus="true"
                  nextLabel="Siguiente" backLabel="Anterior"
                  flowListener="#{centroMedicoCtrl.onFlow}"
                  step="#{centroMedicoCtrl.activeStep}">

            <p:tab id="step1" title="Formulario (A–F)">
                <ui:include src="/pages/step1.xhtml"/>
            </p:tab>

            <p:tab id="step2" title="Riesgos (G)">
                <ui:include src="/pages/step2.xhtml"/>
            </p:tab>

            <p:tab id="step3" title="Historia / Resultados (H–O)">
                <ui:include src="/pages/step3.xhtml"/>
            </p:tab>

            <p:tab id="step4" title="Certificado (PDF)">
                <ui:include src="/pages/step4.xhtml"/>
            </p:tab>

        </p:wizard>


        <p:toolbar styleClass="mt-3">
            <p:toolbarGroup>
                <p:commandButton value="Anterior"
                                 icon="pi pi-angle-left"
                                 actionListener="#{centroMedicoCtrl.retrocederStep}"
                                 process="@form"
                                 update="@([id$=wdzFicha]) @([id$=msgs])" />
                <p:spacer width="8"/>
                <p:commandButton value="Siguiente"
                                 icon="pi pi-angle-right"
                                 action="#{centroMedicoCtrl.guardarStepActual}"
                                 process="@form"
                                 update="@([id$=wdzFicha]) @([id$=msgs])" />

            </p:toolbarGroup>
        </p:toolbar>

        </h:form>
    </ui:define>




    <ui:define name="dialogs">


        <p:dialog id="dlgCedula"
                  widgetVar="dlgCedula"
                  header="Buscar por cédula"
                  modal="true"
                  closable="false"
                  resizable="false"
                  draggable="false"
                  appendTo="@(body)"
                  width="560">

            <h:form id="dlgCedulaForm">

                <p:messages id="msgCedula" showDetail="true" closable="true"/>

                <h:panelGrid id="gridCedula" columns="2"
                             columnClasses="col-label-man,col-field-man"
                             styleClass="grid-manual">

                    <h:outputLabel for="cedulaBusqueda" value="Cédula *"/>

                    <p:inputText id="cedulaBusqueda"
                                 value="#{centroMedicoCtrl.cedulaBusqueda}"
                                 maxlength="10"
                                 autocomplete="off" />

                    <h:outputLabel/>

                    <h:panelGroup layout="block" style="text-align:right;">

                        <p:commandButton id="btnBuscarCedula"
                                         value="BUSCAR"
                                         icon="pi pi-search"
                                         action="#{centroMedicoCtrl.buscarCedula}"
                                         process="@this cedulaBusqueda"
                                         update="msgCedula panelBtnManualWrap :centroForm:msgs"
                                         oncomplete="
                                          if (args) {
                                          if (args.encontrado) {
                                         PF('dlgCedula').hide();
                                         rcUpdateWizard();
                                         } else if (args.mostrarManual) {
                                         PF('dlgPersonaAux').show();
                                         }
                                         }
                                         "/>

                        <p:commandButton id="btnCerrarCedula"
                                         value="Cerrar"
                                         icon="pi pi-times"
                                         type="button"
                                         onclick="PF('dlgCedula').hide();"
                                         styleClass="ui-button-secondary"
                                         style="margin-left:.5rem;"/>

                    </h:panelGroup>

                </h:panelGrid>


                <p:outputPanel id="panelBtnManualWrap"
                               layout="block"
                               style="margin-top:14px;"
                               rendered="#{centroMedicoCtrl.permitirIngresoManual}">

                    <p:separator/>

                    <h:panelGroup layout="block" style="text-align:center;">
                        <h:outputText value="No se encontró el empleado. Puede ingresar los datos manualmente."
                                      style="display:block; margin-bottom:10px; font-weight:600;"/>

                        <p:commandButton id="btnIngresoManual"
                                         value="INGRESAR DATOS MANUALMENTE"
                                         icon="pi pi-user-plus"
                                         type="button"
                                         styleClass="ui-button-warning"
                                         onclick="PF('dlgPersonaAux').show();"/>

                        <p:commandButton id="btnReintentar"
                                         value="Limpiar / Reintentar"
                                         icon="pi pi-refresh"
                                         styleClass="ui-button-secondary"
                                         style="margin-left:.5rem;"
                                         action="#{centroMedicoCtrl.limpiarBusquedaCedula}"
                                         process="@this"
                                         update="msgCedula panelBtnManualWrap cedulaBusqueda"/>
                    </h:panelGroup>

                </p:outputPanel>

            </h:form>
        </p:dialog>


        <p:dialog id="dlgPersonaAux"
                  widgetVar="dlgPersonaAux"
                  header="Ingreso manual de datos"
                  modal="true"
                  dynamic="true"
                  closable="true"
                  resizable="false"
                  draggable="false"
                  appendTo="@(body)"
                  width="680">

            <h:form id="dlgPersonaAuxForm">

                <p:messages id="msgPersonaAux" showDetail="true" closable="true"/>

                <h:panelGroup layout="block" styleClass="manual-info">
                    <i class="pi pi-exclamation-triangle" style="margin-right:.5rem;"></i>
                    <h:outputText value="No se encontró el empleado. Puede ingresar los datos manualmente."/>
                </h:panelGroup>

                <p:panelGrid id="gridManual"
                             columns="2"
                             layout="grid"
                             styleClass="ui-fluid manual-grid"
                             columnClasses="manual-label,manual-field">

                    <h:outputLabel for="cedManual" value="Cédula *"/>
                    <p:inputText id="cedManual"
                                 value="#{centroMedicoCtrl.personaAux.cedula}"
                                 maxlength="10"
                                 readonly="true"/>

                    <h:outputLabel for="ap1" value="Primer apellido *"/>
                    <p:inputText id="ap1"
                                 value="#{centroMedicoCtrl.personaAux.apellido1}"
                                 required="true"/>

                    <h:outputLabel for="ap2" value="Segundo apellido"/>
                    <p:inputText id="ap2"
                                 value="#{centroMedicoCtrl.personaAux.apellido2}"/>

                    <h:outputLabel for="nom1" value="Primer nombre *"/>
                    <p:inputText id="nom1"
                                 value="#{centroMedicoCtrl.personaAux.nombre1}"
                                 required="true"/>

                    <h:outputLabel for="nom2" value="Segundo nombre"/>
                    <p:inputText id="nom2"
                                 value="#{centroMedicoCtrl.personaAux.nombre2}"/>

                    <h:outputLabel for="sexoManual" value="Sexo *"/>
                    <p:selectOneMenu id="sexoManual"
                                     value="#{centroMedicoCtrl.personaAux.sexo}"
                                     required="true">
                        <f:selectItem itemLabel="-- Seleccione --" itemValue=""/>
                        <f:selectItem itemLabel="Masculino" itemValue="M"/>
                        <f:selectItem itemLabel="Femenino" itemValue="F"/>
                    </p:selectOneMenu>

                    <h:outputLabel for="fnManual" value="Fecha nacimiento *"/>

                    <p:calendar id="fnManual"
                                value="#{centroMedicoCtrl.personaAux.fechaNac}"
                                pattern="dd/MM/yyyy"
                                navigator="true"
                                showOn="button"
                                yearRange="1924:2007"
                                required="true"/>

                </p:panelGrid>

                <p:separator/>

                <p:commandButton id="btnGuardarPersonaAux"
                                 value="GUARDAR Y USAR EN FICHA"
                                 icon="pi pi-save"
                                 action="#{centroMedicoCtrl.guardarPersonaAuxYUsar}"
                                 process="@form"
                                 update=":centroForm:msgs"
                                 styleClass="manual-btn-guardar"
                                 oncomplete="if (args &amp;&amp; !args.validationFailed) {
                                  PF('dlgPersonaAux').hide();
                                 PF('dlgCedula').hide();
                                 rcUpdateWizard();
                                 }"/>
            </h:form>
        </p:dialog>

    </ui:define>

</ui:composition>
