<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="http://xmlns.jcp.org/jsf/html"
                xmlns:f="http://xmlns.jcp.org/jsf/core"
                xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
                xmlns:p="http://primefaces.org/ui"
                template="/templates/template.xhtml">

    <ui:define name="title">Administración de horarios de citas</ui:define>

    <ui:define name="content">
        <h:form id="horariosForm">
            <p:growl id="growl" showDetail="true"/>

            <p:panel header="Gestión de profesionales" style="margin-bottom:12px;">
                <h:panelGrid columns="2" styleClass="ui-fluid" columnClasses="30%,70%" cellpadding="6">
                    <h:outputText value="Nombre profesional:"/>
                    <p:inputText value="#{citaHorarioAdminCtrl.nombreProfesionalEdit}" required="true"/>

                    <h:outputText value="Código profesional:"/>
                    <p:inputText value="#{citaHorarioAdminCtrl.codigoProfesionalEdit}"/>

                    <h:outputText value="Correo:"/>
                    <p:inputText value="#{citaHorarioAdminCtrl.emailProfesionalEdit}"/>

                    <h:outputText value="Especialidad:"/>
                    <p:selectOneMenu value="#{citaHorarioAdminCtrl.idEspecialidadEdit}">
                        <f:selectItem itemLabel="Seleccione" itemValue="#{null}" noSelectionOption="true"/>
                        <f:selectItems value="#{citaHorarioAdminCtrl.especialidades}" var="esp"
                                       itemValue="#{esp.idEspecialidad}" itemLabel="#{esp.nombre}"/>
                    </p:selectOneMenu>

                    <h:outputText value="Estado:"/>
                    <p:selectOneMenu value="#{citaHorarioAdminCtrl.activoEdit}">
                        <f:selectItem itemValue="S" itemLabel="Activo"/>
                        <f:selectItem itemValue="N" itemLabel="Inactivo"/>
                    </p:selectOneMenu>
                </h:panelGrid>

                <p:commandButton value="Nuevo" icon="pi pi-plus"
                                 actionListener="#{citaHorarioAdminCtrl.prepararNuevoProfesional}"
                                 update="@form" styleClass="ui-button-secondary"/>
                <p:commandButton value="Guardar" icon="pi pi-save"
                                 actionListener="#{citaHorarioAdminCtrl.guardarProfesional}"
                                 update="@form" style="margin-left:6px;"/>
                <p:commandButton value="Eliminar (desactivar)" icon="pi pi-trash"
                                 actionListener="#{citaHorarioAdminCtrl.eliminarProfesional}"
                                 update="@form" styleClass="ui-button-danger" style="margin-left:6px;"
                                 disabled="#{empty citaHorarioAdminCtrl.idProfesionalEdit}"/>

                <p:dataTable value="#{citaHorarioAdminCtrl.profesionalesGestion}" var="pro" paginator="true" rows="8"
                             style="margin-top:10px;">
                    <p:column headerText="ID"><h:outputText value="#{pro.idProfesional}"/></p:column>
                    <p:column headerText="Profesional"><h:outputText value="#{pro.nombreProfesional}"/></p:column>
                    <p:column headerText="Especialidad"><h:outputText value="#{pro.especialidad.nombre}"/></p:column>
                    <p:column headerText="Correo"><h:outputText value="#{pro.email}"/></p:column>
                    <p:column headerText="Estado"><h:outputText value="#{pro.activo}"/></p:column>
                    <p:column headerText="Acción">
                        <p:commandButton value="Editar" icon="pi pi-pencil"
                                         actionListener="#{citaHorarioAdminCtrl.seleccionarProfesional(pro)}"
                                         update="@form" process="@this" styleClass="ui-button-secondary"/>
                    </p:column>
                </p:dataTable>
            </p:panel>

            <p:panel header="Horario base del profesional (Admin)">
                <h:panelGrid columns="2" styleClass="ui-fluid" columnClasses="30%,70%" cellpadding="6">
                    <h:outputText value="Profesional:"/>
                    <p:selectOneMenu value="#{citaHorarioAdminCtrl.idProfesionalSel}">
                        <f:selectItem itemLabel="Seleccione" itemValue="#{null}" noSelectionOption="true"/>
                        <f:selectItems value="#{citaHorarioAdminCtrl.profesionales}" var="pro"
                                       itemValue="#{pro.idProfesional}" itemLabel="#{pro.nombreProfesional}"/>
                    </p:selectOneMenu>

                    <h:outputText value="Día semana:"/>
                    <p:selectOneMenu value="#{citaHorarioAdminCtrl.diaSemanaSel}">
                        <f:selectItem itemLabel="Seleccione" itemValue="#{null}" noSelectionOption="true"/>
                        <f:selectItem itemLabel="1 - Lunes" itemValue="1"/>
                        <f:selectItem itemLabel="2 - Martes" itemValue="2"/>
                        <f:selectItem itemLabel="3 - Miércoles" itemValue="3"/>
                        <f:selectItem itemLabel="4 - Jueves" itemValue="4"/>
                        <f:selectItem itemLabel="5 - Viernes" itemValue="5"/>
                        <f:selectItem itemLabel="6 - Sábado" itemValue="6"/>
                        <f:selectItem itemLabel="7 - Domingo" itemValue="7"/>
                    </p:selectOneMenu>

                    <h:outputText value="Duración atención:"/>
                    <p:selectOneMenu value="#{citaHorarioAdminCtrl.duracionMinSel}">
                        <f:selectItem itemLabel="20 minutos" itemValue="20"/>
                        <f:selectItem itemLabel="25 minutos" itemValue="25"/>
                        <f:selectItem itemLabel="30 minutos" itemValue="30"/>
                    </p:selectOneMenu>
                </h:panelGrid>

                <h:panelGroup layout="block" styleClass="ui-message ui-message-info" style="margin-top:8px; padding:8px;">
                    <span class="ui-message-info-detail">Jornada aplicada: 08:00 a 16:00. Almuerzo: 12:30 a 13:30.</span>
                </h:panelGroup>

                <p:commandButton value="Guardar horario" icon="pi pi-save"
                                 actionListener="#{citaHorarioAdminCtrl.guardarHorario}"
                                 update="@form" style="margin-top:8px;"/>
            </p:panel>

            <p:panel header="Generación de slots para agendamiento" style="margin-top:12px;">
                <h:panelGrid columns="2" styleClass="ui-fluid" columnClasses="30%,70%" cellpadding="6">
                    <h:outputText value="Fecha base:"/>
                    <p:calendar value="#{citaHorarioAdminCtrl.fechaGeneracion}" pattern="dd/MM/yyyy" showOn="button"/>

                    <h:outputText value="Periodicidad:"/>
                    <p:selectOneMenu value="#{citaHorarioAdminCtrl.periodicidadSel}">
                        <f:selectItem itemLabel="Semanal" itemValue="SEMANAL"/>
                        <f:selectItem itemLabel="Mensual" itemValue="MENSUAL"/>
                    </p:selectOneMenu>

                    <h:outputText value="Número de ciclos:"/>
                    <p:spinner value="#{citaHorarioAdminCtrl.ciclosGeneracion}" min="1" max="12"/>
                </h:panelGrid>

                <p:commandButton value="Generar slots" icon="pi pi-calendar-plus"
                                 actionListener="#{citaHorarioAdminCtrl.generarSlots}"
                                 update="@form" style="margin-top:8px;"/>
            </p:panel>
        </h:form>
    </ui:define>
</ui:composition>
