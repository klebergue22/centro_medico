<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui">
<h:head>
    <title>Cambio de clave</title>
</h:head>
<h:body styleClass="ui-fluid" style="padding:2rem; max-width: 480px; margin: 0 auto;">
    <h:form id="passwordForm">
        <h2>Cambio obligatorio de clave</h2>
        <p>Por seguridad, antes de continuar registre una nueva clave.</p>

        <p:messages id="msgs" showDetail="true" closable="true"/>

        <div style="display:flex; flex-direction:column; gap:.75rem;">
            <p:outputLabel for="nueva" value="Nueva clave"/>
            <p:password id="nueva" value="#{authCtrl.nuevaClave}" required="true" feedback="true"/>

            <p:outputLabel for="confirmar" value="Confirmar nueva clave"/>
            <p:password id="confirmar" value="#{authCtrl.confirmarNuevaClave}" required="true" feedback="false"/>

            <p:commandButton value="Guardar y continuar" action="#{authCtrl.cambiarClave}" update="msgs"/>
        </div>
    </h:form>
</h:body>
</html>
