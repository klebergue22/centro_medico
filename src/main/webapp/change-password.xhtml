<!DOCTYPE html>
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="http://xmlns.jcp.org/jsf/html"
                xmlns:p="http://primefaces.org/ui"
                xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
                template="/templates/template.xhtml">

    <ui:define name="title">Cambio de clave - Centro Médico</ui:define>

    <ui:define name="content">
        <h:form id="passwordForm" styleClass="ui-fluid">
            <p:panel header="Cambio obligatorio de clave"
                     style="max-width:680px; margin:2rem auto; border-radius:12px;">

                <p:messages id="msgs" showDetail="true" closable="true"/>

                <h:panelGroup layout="block" style="margin-bottom:1rem; color:#3a4b32;">
                    <h:outputText value="Por seguridad, registre una nueva clave para continuar."/>
                </h:panelGroup>

                <p:panelGrid columns="3" styleClass="emp-3col ui-fluid"
                             columnClasses="lab,fld,msg" layout="tabular">
                    <h:outputLabel for="nueva" value="Nueva clave"/>
                    <p:password id="nueva" value="#{authCtrl.nuevaClave}" required="true"
                                requiredMessage="Ingrese la nueva clave" feedback="true"/>
                    <p:message for="nueva"/>

                    <h:outputLabel for="confirmar" value="Confirmar nueva clave"/>
                    <p:password id="confirmar" value="#{authCtrl.confirmarNuevaClave}" required="true"
                                requiredMessage="Confirme la nueva clave" feedback="false"/>
                    <p:message for="confirmar"/>
                </p:panelGrid>

                <div style="display:flex; justify-content:flex-end; margin-top:1rem;">
                    <p:commandButton value="Guardar y continuar" icon="pi pi-check"
                                     action="#{authCtrl.cambiarClave}" update="msgs passwordForm"/>
                </div>
            </p:panel>
        </h:form>
    </ui:define>
</ui:composition>
